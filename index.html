
<style>
:root {
  --bg: #0a0a0f;
  --card: #12121a;
  --primary: #7c3aed;
  --secondary: #a78bfa;
  --text: #e5e7eb;
  --muted: #9ca3af;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', sans-serif;
}

/* HEADER */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 30px;
  border-bottom: 1px solid var(--primary);
  animation: fadeDown 0.8s ease;
}

.title {
  font-size: 2.2rem;
  color: var(--primary);
}

/* BOTONES */
.btn {
  background: transparent;
  border: 1px solid var(--primary);
  padding: 8px 14px;
  border-radius: 8px;
  color: var(--text);
  transition: 0.3s;
}

.btn:hover {
  background: var(--primary);
  transform: translateY(-2px);
  box-shadow: 0 0 12px var(--primary);
}

/* SECCIONES */
.section {
  margin: 30px 0;
  padding: 25px;
  border-radius: 12px;
  background: var(--card);
  animation: fadeUp 0.8s ease;
}

/* CARDS */
.card {
  background: #181825;
  padding: 18px;
  border-radius: 12px;
  transition: 0.3s;
  border: 1px solid transparent;
}

.card:hover {
  transform: translateY(-6px) scale(1.01);
  border-color: var(--primary);
  box-shadow: 0 0 20px rgba(124, 58, 237, 0.3);
}

/* GRID */
.grid2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 15px;
}

/* PROFILE */
.profile img {
  width: 100%;
  border-radius: 10px;
  margin-bottom: 10px;
}

/* PILLS */
.pill {
  background: var(--primary);
  padding: 5px 10px;
  border-radius: 20px;
  font-size: 0.8rem;
  margin: 3px;
  display: inline-block;
}

/* ANIMACIONES */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px);}
  to { opacity: 1; transform: translateY(0);}
}

@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-20px);}
  to { opacity: 1; transform: translateY(0);}
}

/* INPUTS */
.input, .select {
  padding: 8px;
  border-radius: 6px;
  border: 1px solid var(--primary);
  background: #0f172a;
  color: white;
}

/* RESPONSIVE */
@media (max-width: 768px){
  .grid2 {
    grid-template-columns: 1fr;
  }

  .topbar {
    flex-direction: column;
    gap: 15px;
    text-align: center;
  }
}
</style>
